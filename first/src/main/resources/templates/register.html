<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">

  <head th:replace="/fragments/head :: head">


<body class="sub_page">

  <div class="hero_area">
    <div class="bg-box">
      <img src="images/hero-bg.jpg" alt="">
    </div>
    <!-- header section strats -->
    <header th:replace="/fragments/header :: header">
  </div>

  <!-- about section -->

<!-- book section -->
<section class="book_section layout_padding">
    <div class="container">
      <div class="heading_container">
        <h4>
          Register
        </h4>
      </div>
      <div class="row">
        <div class="col-md-6">
          <div class="form_container">
            <form action="#"
            th:action="@{/register}"
            th:object="${account}"
            method="post"
            >
              <div>
                <input id="email" type="email" th:field="*{email}" class="form-control" placeholder="Your Email" />
              </div>
              <div>
                <input id="password" type="password" class="form-control" th:field="*{password}" placeholder="password" />
              </div>
              <div>
                <input id="firstname" type="text" class="form-control" th:field="*{firstname}" placeholder="First Name" />
              </div>
              <div class="btn_box">
                <button type="submit">
                  Register
                </button>
              </div>
            </form>
          </div>
        </div>
    </div>
  </section>
  <!-- end book section -->

  <!-- end about section -->

  <!-- footer section -->
 
  <!-- footer section -->
  <footer th:replace="/fragments/footer :: footer">
  
</body>

</html>
